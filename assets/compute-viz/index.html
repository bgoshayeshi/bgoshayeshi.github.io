<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Computational sciences</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Vertical flow: one compute units (top) feeds four scientific domains (bottom).
       Embedded as a decorative hero backdrop — no name/title here. -->
  <section class="viz" aria-label="compute units feeding genomics, Bioinformatics, machine learning and AI, and CFD and CAE">
    <div class="stack">

      <!-- === Server: a single unit that enumerates the compute types === -->
      <div class="server">
        <div class="server__bar">
          <span class="led on"></span>
          <span class="server__name">COMPUTE&nbsp;UNIT</span>
          <span class="led on alt"></span>
        </div>
        <div class="server__chips">
          <span class="chip" data-k="cpu">CPU</span>
          <span class="chip" data-k="gpu">GPU</span>
          <span class="chip" data-k="tpu">TPU</span>
          <span class="chip" data-k="fpga">FPGA</span>
        </div>
        <div class="server__mark">x86 · CUDA · ROCm · MPI</div>
      </div>

      <!-- === Sciences: vertical zigzag, each fed by its own wire === -->
      <div class="sciences">

        <!-- Connectors: four separate wires, one source per science on the compute unit box,
             each landing on the top of its science box. Fixed px coordinate space
             (viewBox matches .sciences box) so wires meet the box tops exactly. -->
        <svg class="links" viewBox="0 0 330 410" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <!-- Source order on the compute unit box, left → right: MD, CFD, ML, Genomics.
               wcfd and wml run straight down the central gutter (clear of the
               box above their target) before curving into their box top, so
               they never pass under another box. -->
          <g class="links__base">
            <path id="wmd"  d="M138,8 C138,67 78,96  78,126" />
            <path id="wcfd" d="M156,8 C156,110 156,190 156,224 C156,255 102,295 78,298" />
            <path id="wml"  d="M174,8 C174,80 174,125 174,150 C174,178 232,206 252,212" />
            <path id="wgen" d="M192,8 C192,24 252,10  252,40" />
          </g>
          <g class="links__flow">
            <use href="#wgen" class="wf w-gen" />
            <use href="#wmd"  class="wf w-md" />
            <use href="#wml"  class="wf w-ml" />
            <use href="#wcfd" class="wf w-cfd" />
          </g>
          <g class="links__src">
            <circle class="src w-md"  cx="138" cy="8" r="3.4" />
            <circle class="src w-cfd" cx="156" cy="8" r="3.4" />
            <circle class="src w-ml"  cx="174" cy="8" r="3.4" />
            <circle class="src w-gen" cx="192" cy="8" r="3.4" />
          </g>
        </svg>

        <!-- Genomics (right) -->
        <figure class="sci right" data-sci="genomics">
          <span class="sci__port" aria-hidden="true"></span>
          <div class="sci__art art-dna">
            <div class="dna-tape">
              <span class="base a">A</span><span class="base t">T</span><span class="base g">G</span><span class="base c">C</span><span class="base a">A</span><span class="base g">G</span><span class="base t">T</span><span class="base c">C</span><span class="base a">A</span><span class="base g">G</span><span class="base t">T</span><span class="base c">C</span>
            </div>
          </div>
          <figcaption>Genomics</figcaption>
        </figure>

        <!-- Bioinformatics (left) -->
        <figure class="sci left" data-sci="md">
          <span class="sci__port" aria-hidden="true"></span>
          <div class="sci__art art-md">
            <!-- 3D ball-and-stick molecule (tetrahedral): one central atom with
                 four bonded atoms, rotating on a turntable so front atoms occlude
                 the back ones. Pure CSS 3D (transform-style: preserve-3d). -->
            <div class="mol3d">
              <div class="mol3d__spin">
                <span class="bond b1"></span>
                <span class="bond b2"></span>
                <span class="bond b3"></span>
                <span class="bond b4"></span>
                <span class="apos a1"><i class="atom atom-o"></i></span>
                <span class="apos a2"><i class="atom atom-n"></i></span>
                <span class="apos a3"><i class="atom atom-h"></i></span>
                <span class="apos a4"><i class="atom atom-h"></i></span>
                <span class="apos ac"><i class="atom atom-c"></i></span>
              </div>
            </div>
          </div>
          <figcaption>Bioinformatics</figcaption>
        </figure>

        <!-- Machine Learning & AI (right) -->
        <figure class="sci right" data-sci="ml">
          <span class="sci__port" aria-hidden="true"></span>
          <div class="sci__art art-ml">
            <svg viewBox="0 0 140 100" class="net">
              <g class="edges">
                <line x1="20" y1="20" x2="70" y2="20" /><line x1="20" y1="20" x2="70" y2="50" /><line x1="20" y1="20" x2="70" y2="80" />
                <line x1="20" y1="50" x2="70" y2="20" /><line x1="20" y1="50" x2="70" y2="50" /><line x1="20" y1="50" x2="70" y2="80" />
                <line x1="20" y1="80" x2="70" y2="20" /><line x1="20" y1="80" x2="70" y2="50" /><line x1="20" y1="80" x2="70" y2="80" />
                <line x1="70" y1="20" x2="120" y2="35" /><line x1="70" y1="20" x2="120" y2="65" />
                <line x1="70" y1="50" x2="120" y2="35" /><line x1="70" y1="50" x2="120" y2="65" />
                <line x1="70" y1="80" x2="120" y2="35" /><line x1="70" y1="80" x2="120" y2="65" />
              </g>
              <g class="nodes">
                <circle cx="20" cy="20" r="5" /><circle cx="20" cy="50" r="5" /><circle cx="20" cy="80" r="5" />
                <circle cx="70" cy="20" r="5" /><circle cx="70" cy="50" r="5" /><circle cx="70" cy="80" r="5" />
                <circle cx="120" cy="35" r="5" /><circle cx="120" cy="65" r="5" />
              </g>
            </svg>
          </div>
          <figcaption>Machine Learning &amp; AI</figcaption>
        </figure>

        <!-- CFD & CAE (left) -->
        <figure class="sci left" data-sci="cfd">
          <span class="sci__port" aria-hidden="true"></span>
          <div class="sci__art art-cfd">
            <div class="flame-wrap">
              <div class="flame f1"></div>
              <div class="flame f2"></div>
              <div class="flame f3"></div>
            </div>
          </div>
          <figcaption>CFD &amp; CAE</figcaption>
        </figure>

      </div>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
